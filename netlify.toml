[build]
  command = "npm install && npm run build:web && npm run build:nextbound && npm run build:feed && npm run build:netlify-fn"
  publish = "web/nextbound-dist"

[build.environment]
  NODE_VERSION = "20"

# The MCP function is PRE-BUNDLED by build:netlify-fn into
# netlify/functions/mcp.mjs (self-contained), so Netlify must NOT re-bundle it
# (its esbuild follows the server graph into frontend CSS imports and fails).
# Widget HTML is shipped via included_files; readWidget resolves it at runtime.
[functions]
  # Ship our self-contained prebuilt mcp.mjs without re-bundling the server
  # source (Netlify's esbuild would follow it into frontend CSS and fail).
  node_bundler = "none"
  included_files = [
    "web/dist/**",
    "web/nextbound-dist/**",
    "web/artifact-feed-dist/**",
    "knowledge/**",
    "server/data/**",
  ]

[[redirects]]
  from = "/run"
  to = "/.netlify/functions/mcp"
  status = 200
  force = true

[[redirects]]
  from = "/.well-known/ginse.json"
  to = "/.netlify/functions/mcp"
  status = 200
  force = true

# Route the MCP endpoints to the function (belt-and-suspenders alongside the
# function's own config.path, in case it isn't read from a prebuilt .mjs).
[[redirects]]
  from = "/mcp"
  to = "/.netlify/functions/mcp"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/mcp"
  status = 200
  force = true

# Root shows the themed procedural-loop board.
[[redirects]]
  from = "/"
  to = "/nextbound.html?scenario=procedural-loop"
  status = 302
