[build]
  command = "npm run build:afterlight && npm run verify:afterlight && npm run build:netlify-fn"
  publish = "web/afterlight-dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "none"
  included_files = ["web/afterlight-dist/**", "web/mcp-widget.html", "server/data/**", "knowledge/**"]

[[redirects]]
  from = "/mcp"
  to = "/.netlify/functions/mcp"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/mcp"
  status = 200
  force = true
