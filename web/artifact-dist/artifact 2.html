<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#061722" />
    <title>Nextbound Experience Engine</title>
    <script>
      window.__NEXTBOUND_ARTIFACT__ = {
        scenario: "procedural-loop",
        seedId: "seed-afterlight-maya",
        recipientId: "camille",
        contractId: "visual-lab",
      };
    </script>
    <script type="module" crossorigin src="/assets/artifact-BYDbsFbp.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/artifact-C0FYcrrk.css">
  </head>
  <body>
    <main
      x-data="nextbound"
      :class="['app theme-'+profileId,'design-'+designMode,'user-world-'+profileId,'user-style-'+userVisualStyle,'content-world-'+(runtimeExecution?.contractId||'visual-lab'),loopMode?'loop-layout news-feed':'']"
      :style="loopMode?adaptiveBackdrop:''"
    >
      <header class="top">
        <a class="wordmark" href="/nextbound.html?scenario=procedural-loop"
          ><i>N</i> NEXTBOUND</a
        >
        <span>NEXTBOUND EXPERIENCE ENGINE · ARTIFACT</span>
        <span class="loop-badge">PROCEDURAL LOOP</span>
        <label class="persona-switcher">
          <small>VIEW AS</small>
          <select
            :value="profileId"
            @change="switchRuntimeProfile($el.value)"
            :disabled="loading"
          >
            <option value="camille">Camille · Artistic director</option>
            <option value="alex">Alex · CEO</option>
            <option value="maya">Maya · Developer student</option>
          </select>
        </label>
        <label class="design-switcher">
          <small>DESIGN</small>
          <select :value="designMode" @change="switchDesignMode($el.value)">
            <option value="wireframe">Wireframe editorial</option>
            <option value="minimal">Minimal</option>
            <option value="glass">Glassmorphism</option>
            <option value="brutalist">Brutalism</option>
            <option value="playful">Playful</option>
            <option value="swiss">Swiss International</option>
            <option value="bauhaus">Bauhaus</option>
            <option value="editorial">Editorial luxury</option>
            <option value="bento">Bento grid</option>
            <option value="material">Material Design</option>
            <option value="neobrutalist">Neo-brutalism</option>
            <option value="clay">Claymorphism</option>
            <option value="neumorphic">Neumorphism</option>
            <option value="y2k">Y2K</option>
            <option value="cyberpunk">Cyberpunk</option>
            <option value="retrofuturist">Retro-futurism</option>
          </select>
        </label>
        <label class="world-switcher">
          <small>WORLD</small>
          <select
            :value="userVisualStyle"
            @change="switchUserVisualStyle($el.value)"
          >
            <template
              x-for="style in userVisualStyleOptions"
              :key="style.value"
            >
              <option :value="style.value" x-text="style.label"></option>
            </template>
          </select>
        </label>
      </header>
      <section class="runtime-demo" x-show="loopMode" x-cloak>
        <p class="runtime-error" x-show="error" x-text="error"></p>
        <template x-if="runtimeExecution">
          <div
            class="runtime-frame"
            :class="'widget-'+runtimeExecution.contractId"
            data-widget="artifact-contract"
          >
            <small x-text="'CONTRACT · '+runtimeExecution.contractId"></small>
            <h1 x-text="runtimeTrace?.contract?.title"></h1>
            <p x-text="runtimeTrace?.contract?.invariants?.creatorIntent"></p>
            <div class="runtime-actions">
              <template
                x-for="action in runtimeExecution.availableInteractions"
                :key="action.id"
              >
                <button
                  @click="runtimeInteractFromAction(action)"
                  x-text="action.label"
                  :disabled="loading"
                ></button>
              </template>
            </div>
          </div>
        </template>
        <template x-for="frame in runtimeExecution?.frames||[]" :key="frame.id">
          <article
            class="runtime-frame content-widget"
            :class="'frame-'+frame.schemaId"
            data-widget="frame"
          >
            <small x-text="frame.schemaId"></small>
            <template x-for="block in frame.blocks" :key="block.id">
              <p x-text="block.text"></p>
            </template>
          </article>
        </template>
        <template
          x-for="nextbound in runtimeExecution?.resolvedNextbounds||[]"
          :key="nextbound.id"
        >
          <article
            class="nextbound-widget content-widget"
            data-widget="nextbound"
            :class="'nextbound-to-'+nextbound.destination.targetId"
          >
            <p class="nextbound-reading-line">
              <button
                class="nextbound-word"
                @click="runtimeInteract($el.dataset.nextboundId,$el.dataset.targetContractId)"
                :data-nextbound-id="nextbound.id"
                :data-target-contract-id="nextbound.destination.targetId"
                :disabled="loading||nextbound.availability.status==='unavailable'"
                x-text="nextbound.trigger.anchor"
              ></button>
              <em x-text="nextbound.destination.targetId"></em>
            </p>
            <p
              class="nextbound-explanation"
              x-text="nextbound.semanticReason"
            ></p>
          </article>
        </template>
      </section>
    </main>
  </body>
</html>
