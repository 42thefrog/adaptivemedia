<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nextbound · {{NAME}}</title>
    <style>
      :root { color: #10234a; font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8f9fc; }
      * { box-sizing: border-box; }
      body { margin: 0; }
      main { max-width: 600px; margin: auto; padding: 18px; background: radial-gradient(circle at 78% 4%, #dfeaff, transparent 32%), #fbfbfd; }
      header { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e1e7f2; padding-bottom: 14px; }
      .brand { font-size: 15px; font-weight: 800; letter-spacing: -.02em; }
      .brand span, .eyebrow { color: {{ACCENT}}; font-size: 10px; font-weight: 800; letter-spacing: .17em; text-transform: uppercase; }
      .hero { text-align: center; padding: 24px 0 16px; }
      h1 { font-size: 36px; margin: 5px 0 7px; letter-spacing: -.06em; color: #101114; }
      .hero p { color: #747987; margin: 0; font-size: 14px; }
      .card { overflow: hidden; border: 1px solid #dce4f0; border-radius: 20px; background: white; box-shadow: 0 14px 35px #31476b1c; }
      .card-top { padding: 14px 15px 0; display: flex; justify-content: space-between; gap: 8px; font-size: 10px; font-weight: 800; letter-spacing: .06em; }
      .card-top small { color: #7b8493; font-weight: 500; letter-spacing: 0; }
      .card h2 { margin: 16px 15px 8px; font-size: 26px; line-height: .98; letter-spacing: -.05em; }
      .card img { display: block; width: 100%; margin-top: 12px; background: #edf0f5; }
      .note { margin: 14px 4px 18px; color: #686f7d; text-align: center; font-size: 13px; line-height: 1.45; }
    </style>
  </head>
  <body>
    <main>
      <header><div class="brand">Nextbound <span>· mcp artifact</span></div><span class="eyebrow">Personal experience</span></header>
      <section class="hero"><p class="eyebrow">for {{NAME}} · {{ROLE}}</p><h1>AFTERLIGHT</h1><p>One creator. One personal experience.</p></section>
      <article class="card">
        <div class="card-top"><span>{{COLLECTION}}</span><small>for {{NAME}}</small></div>
        <h2>{{HEADLINE}}</h2>
        <img src="https://nextbound-adaptive-media.netlify.app/{{IMAGE}}" alt="{{NAME}}'s personal NIHE artifact" />
      </article>
      <p class="note">Luna shared one artifact. This is {{NAME}}’s personal version.</p>
    </main>
  </body>
</html>
